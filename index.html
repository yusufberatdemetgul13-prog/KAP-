<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapı Sistemi - Akıllı Giriş</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 420px; width: 100%; background: #1e1e1e; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; }
        h1 { color: #f1c40f; text-transform: uppercase; margin-bottom: 20px; }
        .btn { background: #e74c3c; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-edit { background: #f39c12; padding: 6px 10px; font-size: 12px; margin-right: 5px; border-radius: 5px; border:none; color:white; cursor:pointer; }
        .btn-delete { background: #c0392b; padding: 6px 10px; font-size: 12px; border-radius: 5px; border:none; color:white; cursor:pointer; }
        .status-panel { background: #262626; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #444; }
        .user-list { text-align: left; background: #262626; padding: 15px; border-radius: 12px; margin-top: 20px; }
        .user-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 10px 0; }
        .hidden { display: none !important; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: white; text-align: center; }
        .logout-link { color: #888; font-size: 12px; cursor: pointer; text-decoration: underline; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="main-title">KAPI SİSTEMİ</h1>

        <!-- GİRİŞ EKRANI -->
        <div id="login-screen">
            <input type="text" id="login-user" placeholder="Kullanıcı Adı">
            <input type="password" id="login-pass" placeholder="Şifre">
            <button class="btn" onclick="checkLogin()">GİRİŞ YAP</button>
        </div>

        <!-- KULLANICI PANELİ -->
        <div id="user-panel" class="hidden">
            <div class="status-panel">
                <span style="color: #888; font-size: 12px;">PERSONEL: <span id="welcome-name"></span></span>
                <span id="durum-metni-user" style="font-size: 22px; font-weight: bold; display: block;">...</span>
            </div>
            <button class="btn" onclick="kapiyiAc()">KAPIYI AÇ</button>
            <span class="logout-link" onclick="logout()">Hesaptan Çıkış Yap</span>
        </div>

        <!-- ADMIN PANELİ -->
        <div id="admin-panel" class="hidden">
            <div class="status-panel">
                <span id="durum-metni-admin" style="font-size: 24px; font-weight: bold;">...</span>
            </div>
            <button class="btn" onclick="kapiyiAc()">KAPIYI AÇ</button>
            
            <div class="user-list">
                <h3>Yönetici Bilgileri</h3>
                <input type="password" id="new-admin-pass" placeholder="Yeni Admin Şifresi">
                <button class="btn" style="background:#2ecc71; font-size:14px;" onclick="adminGuncelle()">ŞİFREMİ GÜNCELLE</button>
                <hr>
                <h3>Kullanıcıları Düzenle</h3>
                <div id="users-container"></div>
                <h4>Yeni Kullanıcı Tanımla</h4>
                <input type="text" id="new-user-name" placeholder="İsim">
                <input type="text" id="new-user-pass" placeholder="Şifre">
                <button class="btn" style="background:#3498db;" onclick="kullaniciEkle()">KAYDET</button>
            </div>
            <span class="logout-link" onclick="logout()">Güvenli Çıkış</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApPXPSNCIKbP2LQeEvgRzHULKigfTrLOc",
            databaseURL: "https://tobbmt-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. OTOMATİK GİRİŞ KONTROLÜ (Sayfa açılınca cihazı tanır)
        window.onload = function() {
            const savedUser = localStorage.getItem('kapi_user');
            const savedPass = localStorage.getItem('kapi_pass');
            if (savedUser && savedPass) {
                document.getElementById('login-user').value = savedUser;
                document.getElementById('login-pass').value = savedPass;
                checkLogin(true); // Otomatik modda giriş yap
            }
        };

        function checkLogin(isAuto = false) {
            const uName = document.getElementById('login-user').value;
            const uPass = document.getElementById('login-pass').value;
            
            database.ref('/adminConfig').once('value', (snapshot) => {
                const adminData = snapshot.val() || { user: "admin", pass: "1234" };
                if (uName === adminData.user && uPass === adminData.pass) {
                    saveAndShow('admin-panel', uName, uPass);
                    startStatusListener('durum-metni-admin');
                } else {
                    database.ref('/users/' + uName).once('value', (snap) => {
                        if (snap.exists() && snap.val() == uPass) {
                            saveAndShow('user-panel', uName, uPass);
                            document.getElementById('welcome-name').innerText = uName.toUpperCase();
                            startStatusListener('durum-metni-user');
                        } else if(!isAuto) { alert("Hatalı Giriş!"); }
                    });
                }
            });
        }

        function saveAndShow(panelId, u, p) {
            localStorage.setItem('kapi_user', u); // Cihaza kaydet
            localStorage.setItem('kapi_pass', p);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById(panelId).classList.remove('hidden');
            if(panelId === 'admin-panel') loadUserList();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function startStatusListener(id) {
            database.ref('/gercek_kapi_durumu').on('value', (s) => {
                const d = s.val();
                const el = document.getElementById(id);
                el.innerText = d ? d.toUpperCase() : "...";
                el.style.color = (d === "Kapı Açık") ? "#ff4757" : "#2ed573";
            });
        }

        function loadUserList() {
            database.ref('/users').on('value', (snapshot) => {
                const container = document.getElementById('users-container');
                container.innerHTML = "";
                snapshot.forEach((child) => {
                    container.innerHTML += `<div class="user-item">
                        <span><strong>${child.key}</strong>: ${child.val()}</span>
                        <div>
                            <button class="btn-edit" onclick="kullaniciDuzenle('${child.key}', '${child.val()}')">DÜZENLE</button>
                            <button class="btn-delete" onclick="kullaniciSil('${child.key}')">SİL</button>
                        </div>
                    </div>`;
                });
            });
        }

        function kullaniciDuzenle(oldName, oldPass) {
            const newPass = prompt(oldName + " için yeni şifre girin:", oldPass);
            if (newPass) database.ref('/users/' + oldName).set(newPass);
        }

        function adminGuncelle() {
            const p = document.getElementById('new-admin-pass').value;
            if(p) database.ref('/adminConfig').update({ pass: p }).then(() => alert("Admin şifresi güncellendi!"));
        }

        function kapiyiAc() { database.ref('/').update({ kapi_durumu: 1 }); }
        function kullaniciEkle() {
            const n = document.getElementById('new-user-name').value;
            const p = document.getElementById('new-user-pass').value;
            if(n && p) database.ref('/users/' + n).set(p);
        }
        function kullaniciSil(u) { if(confirm("Silinsin mi?")) database.ref('/users/' + u).remove(); }
    </script>
</body>
</html>
