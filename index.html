<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balkale Yönetim Sistemi</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: #262626; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #f1c40f; margin-bottom: 25px; }
        .btn { background: #e74c3c; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-admin { background: #3498db; }
        .btn-save { background: #2ecc71; font-size: 14px; padding: 10px; }
        .btn-delete { background: #c0392b; padding: 8px 12px; font-size: 12px; width: auto; border-radius: 5px; border:none; color:white; cursor:pointer; }
        .status-panel { background: #333; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #444; }
        .user-list { text-align: left; background: #333; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .user-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding: 12px 0; }
        .hidden { display: none; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; text-align: center; }
        h4 { color: #f1c40f; margin-top: 25px; border-top: 1px solid #444; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BALKALE KAPI</h1>

        <!-- GİRİŞ EKRANI -->
        <div id="login-screen">
            <input type="text" id="login-user" placeholder="Kullanıcı Adı">
            <input type="password" id="login-pass" placeholder="Şifre">
            <button class="btn" onclick="checkLogin()">GİRİŞ YAP</button>
        </div>

        <!-- KULLANICI PANELİ -->
        <div id="user-panel" class="hidden">
            <div class="status-panel">Hoş Geldin, <span id="welcome-name"></span></div>
            <button class="btn" onclick="kapiyiAc()">KAPIYI AÇ</button>
        </div>

        <!-- ADMIN PANELİ -->
        <div id="admin-panel" class="hidden">
            <div class="status-panel">
                <span style="color: #aaa; font-size: 12px;">KAPI DURUMU</span>
                <span id="durum-metni" style="font-size: 24px; font-weight: bold; display: block;">YÜKLENİYOR...</span>
            </div>
            
            <button class="btn" onclick="kapiyiAc()">KAPIYI AÇ</button>

            <!-- Admin Ayarları -->
            <div class="user-list">
                <h3>Yönetici Ayarları</h3>
                <input type="text" id="new-admin-user" placeholder="Yeni Admin Adı">
                <input type="password" id="new-admin-pass" placeholder="Yeni Admin Şifresi">
                <button class="btn btn-save" onclick="adminGuncelle()">ADMİN BİLGİLERİNİ GÜNCELLE</button>
                
                <hr>

                <h3>Personel Yönetimi</h3>
                <div id="users-container"></div>
                
                <h4>Yeni Personel Ekle</h4>
                <input type="text" id="new-user-name" placeholder="Personel Adı">
                <input type="text" id="new-user-pass" placeholder="Şifre">
                <button class="btn btn-admin" onclick="kullaniciEkle()">YETKİ VER</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApPXPSNCIKbP2LQeEvgRzHULKigfTrLOc",
            databaseURL: "https://tobbmt-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // İLK KURULUM: Eğer Firebase boşsa varsayılan admini oluştur
        database.ref('/adminConfig').once('value', (s) => {
            if(!s.exists()) { database.ref('/adminConfig').set({ user: "admin", pass: "1234" }); }
        });

        function checkLogin() {
            const uName = document.getElementById('login-user').value;
            const uPass = document.getElementById('login-pass').value;
            
            // Admin kontrolü (Firebase'den)
            database.ref('/adminConfig').once('value', (snapshot) => {
                const adminData = snapshot.val();
                if (uName === adminData.user && uPass === adminData.pass) {
                    showAdminPanel();
                } else {
                    // Personel kontrolü
                    database.ref('/users/' + uName).once('value', (snapshot) => {
                        if (snapshot.exists() && snapshot.val() == uPass) {
                            document.getElementById('login-screen').className = 'hidden';
                            document.getElementById('user-panel').className = '';
                            document.getElementById('welcome-name').innerText = uName;
                        } else {
                            alert("Hatalı Giriş!");
                        }
                    });
                }
            });
        }

        function showAdminPanel() {
            document.getElementById('login-screen').className = 'hidden';
            document.getElementById('admin-panel').className = '';
            
            database.ref('/gercek_kapi_durumu').on('value', (s) => {
                const d = s.val();
                const el = document.getElementById('durum-metni');
                el.innerText = d ? d.toUpperCase() : "VERİ YOK";
                el.style.color = (d === "Kapı Açık") ? "#e74c3c" : "#2ecc71";
            });

            database.ref('/users').on('value', (snapshot) => {
                const container = document.getElementById('users-container');
                container.innerHTML = "";
                snapshot.forEach((child) => {
                    container.innerHTML += `<div class="user-item">
                        <span><strong>${child.key}</strong> (${child.val()})</span>
                        <button class="btn-delete" onclick="kullaniciSil('${child.key}')">SİL</button>
                    </div>`;
                });
            });
        }

        function adminGuncelle() {
            const newUser = document.getElementById('new-admin-user').value;
            const newPass = document.getElementById('new-admin-pass').value;
            if(newUser && newPass) {
                database.ref('/adminConfig').set({ user: newUser, pass: newPass })
                .then(() => alert("Admin bilgileri güncellendi! Bir sonraki girişte yenilerini kullanın."));
            } else { alert("Lütfen boş bırakmayın!"); }
        }

        function kapiyiAc() { database.ref('/').update({ kapi_durumu: 1 }); }
        function kullaniciEkle() {
            const name = document.getElementById('new-user-name').value;
            const pass = document.getElementById('new-user-pass').value;
            if(name && pass) { database.ref('/users/' + name).set(pass); }
        }
        function kullaniciSil(u) { if(confirm(u + " silinsin mi?")) database.ref('/users/' + u).remove(); }
    </script>
</body>
</html>
