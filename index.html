<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapı Sistemi</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #121212; /* Tam siyah arka plan */
            color: white; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { 
            max-width: 400px; 
            width: 100%;
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            border: 1px solid #333;
        }
        h1 { color: #f1c40f; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .btn { background: #e74c3c; color: white; border: none; padding: 18px; font-size: 20px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-admin { background: #3498db; }
        .btn-save { background: #2ecc71; font-size: 14px; padding: 10px; }
        .btn-delete { background: #c0392b; padding: 8px 12px; font-size: 12px; border-radius: 5px; border:none; color:white; cursor:pointer; }
        .status-panel { background: #262626; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #444; }
        .user-list { text-align: left; background: #262626; padding: 15px; border-radius: 10px; margin-top: 20px; max-height: 250px; overflow-y: auto; }
        .user-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 10px 0; }
        .hidden { display: none !important; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: white; text-align: center; }
        h3, h4 { color: #f1c40f; margin-top: 20px; font-size: 16px; }
        #durum-metni { font-size: 24px; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>KAPI SİSTEMİ</h1>

        <!-- GİRİŞ EKRANI -->
        <div id="login-screen">
            <input type="text" id="login-user" placeholder="Kullanıcı Adı">
            <input type="password" id="login-pass" placeholder="Şifre">
            <button class="btn" onclick="checkLogin()">GİRİŞ YAP</button>
        </div>

        <!-- KULLANICI PANELİ -->
        <div id="user-panel" class="hidden">
            <div class="status-panel">
                <span style="color: #888; font-size: 12px;">PERSONEL: <span id="welcome-name"></span></span>
                <span id="durum-metni-user" style="font-size: 22px; font-weight: bold; display: block; margin-top: 5px;">...</span>
            </div>
            <button class="btn" onclick="kapiyiAc()">KAPIYI AÇ</button>
        </div>

        <!-- ADMIN PANELİ -->
        <div id="admin-panel" class="hidden">
            <div class="status-panel">
                <span style="color: #888; font-size: 12px;">SİSTEM DURUMU (ADMİN)</span>
                <span id="durum-metni-admin" style="font-size: 24px; font-weight: bold; display: block;">...</span>
            </div>
            <button class="btn" onclick="kapiyiAc()">KAPIYI AÇ</button>

            <div class="user-list">
                <h3>Yönetici Ayarları</h3>
                <input type="text" id="new-admin-user" placeholder="Yeni Admin Adı">
                <input type="password" id="new-admin-pass" placeholder="Yeni Admin Şifresi">
                <button class="btn btn-save" onclick="adminGuncelle()">BİLGİLERİ GÜNCELLE</button>
                
                <hr style="border:0; border-top:1px solid #444; margin:20px 0;">
                
                <h3>Personel Yönetimi</h3>
                <div id="users-container"></div>
                <h4>Yeni Personel Ekle</h4>
                <input type="text" id="new-user-name" placeholder="Personel Adı">
                <input type="text" id="new-user-pass" placeholder="Şifre">
                <button class="btn btn-admin" onclick="kullaniciEkle()">YETKİ VER</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApPXPSNCIKbP2LQeEvgRzHULKigfTrLOc",
            databaseURL: "https://tobbmt-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function checkLogin() {
            const uName = document.getElementById('login-user').value;
            const uPass = document.getElementById('login-pass').value;
            
            database.ref('/adminConfig').once('value', (snapshot) => {
                const adminData = snapshot.val() || { user: "admin", pass: "1234" };
                if (uName === adminData.user && uPass === adminData.pass) {
                    showPanel('admin-panel');
                    startStatusListener('durum-metni-admin');
                } else {
                    database.ref('/users/' + uName).once('value', (snapshot) => {
                        if (snapshot.exists() && snapshot.val() == uPass) {
                            showPanel('user-panel');
                            document.getElementById('welcome-name').innerText = uName.toUpperCase();
                            startStatusListener('durum-metni-user');
                        } else { alert("Hatalı Giriş Bilgisi!"); }
                    });
                }
            });
        }

        function showPanel(id) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if(id === 'admin-panel') loadUserList();
        }

        function startStatusListener(id) {
            database.ref('/gercek_kapi_durumu').on('value', (s) => {
                const d = s.val();
                const el = document.getElementById(id);
                el.innerText = d ? d.toUpperCase() : "BAĞLANTI YOK";
                el.style.color = (d === "Kapı Açık") ? "#ff4757" : "#2ed573";
            });
        }

        function loadUserList() {
            database.ref('/users').on('value', (snapshot) => {
                const container = document.getElementById('users-container');
                container.innerHTML = "";
                snapshot.forEach((child) => {
                    container.innerHTML += `<div class="user-item">
                        <span><strong>${child.key}</strong></span>
                        <button class="btn-delete" onclick="kullaniciSil('${child.key}')">SİL</button>
                    </div>`;
                });
            });
        }

        function kapiyiAc() { 
            database.ref('/').update({ kapi_durumu: 1 });
            alert("Açma sinyali gönderildi!");
        }

        function adminGuncelle() {
            const u = document.getElementById('new-admin-user').value;
            const p = document.getElementById('new-admin-pass').value;
            if(u && p) database.ref('/adminConfig').set({ user: u, pass: p }).then(() => alert("Admin güncellendi!"));
        }

        function kullaniciEkle() {
            const n = document.getElementById('new-user-name').value;
            const p = document.getElementById('new-user-pass').value;
            if(n && p) database.ref('/users/' + n).set(p);
        }

        function kullaniciSil(u) { if(confirm("Yetki silinsin mi?")) database.ref('/users/' + u).remove(); }
    </script>
</body>
</html>
